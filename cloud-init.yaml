#cloud-config
timezone: UTC
package_upgrade: false
locale: en_US.UTF-8
packages:
  - eslint
  - ffmpeg
  - git
  - imagemagick
  - libmysqlclient-dev
  - libncurses-dev
  - libpq-dev
  - libsqlite3-dev
  - libssl-dev
  - libvips-dev
  - libxml2
  - libxml2-dev
  - libxslt1-dev
  - libyaml-dev
  - memcached
  - mupdf
  - mupdf-tools
  - nodejs
  - npm
  - pkg-config
  - poppler-utils
  - postgresql
  - postgresql-contrib
  - rabbitmq-server
  - redis-server
  - sqlite3
  - tzdata-legacy


hostname: rails-dev-box
users:
  - name: ubuntu
    groups: sudo
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
swap:
  filename: /swapfile
  size: "auto" # or size in bytes
  maxsize: 2147483648
runcmd:
  - sed -i -e '/^PermitRootLogin/s/^.*$/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's|[#]*PasswordAuthentication yes|PasswordAuthentication no|g' /etc/ssh/sshd_config
  - sed -i 's|UsePAM yes|UsePAM no|g' /etc/ssh/sshd_config
  - restart ssh
  - sudo -u postgres createuser --superuser ubuntu
  - sudo -u postgres createdb -O ubuntu -E UTF8 -T template0 activerecord_unittest
  - sudo -u postgres createdb -O ubuntu -E UTF8 -T template0 activerecord_unittest2
  - echo "mysql-server mysql-server/root_password password root" | sudo debconf-set-selections
  - echo "mysql-server mysql-server/root_password_again password root" | sudo debconf-set-selections
  - sudo apt-get -y install mysql-server
  - |
    MYSQL_PWD=root mysql -uroot <<SQL
    CREATE USER 'rails'@'localhost';
    CREATE DATABASE activerecord_unittest  DEFAULT CHARACTER SET utf8mb4;
    CREATE DATABASE activerecord_unittest2 DEFAULT CHARACTER SET utf8mb4;
    GRANT ALL PRIVILEGES ON activerecord_unittest.* to 'rails'@'localhost';
    GRANT ALL PRIVILEGES ON activerecord_unittest2.* to 'rails'@'localhost';
    GRANT ALL PRIVILEGES ON inexistent_activerecord_unittest.* to 'rails'@'localhost';
    SQL
  - sudo -u ubuntu npm install eslint-plugin-import@latest --save-dev
  - sudo -u ubuntu bash -c 'for i in 1 2 3; do curl https://mise.run | sh && break || sleep 10; done'
  - sudo -u ubuntu bash -c 'grep -qxF "eval \"\$(~/.local/bin/mise activate bash)\"" /home/ubuntu/.bashrc || echo "eval \"\$(~/.local/bin/mise activate bash)\"" >> /home/ubuntu/.bashrc'
  - sudo -u ubuntu bash -c 'grep -qxF "eval \"\$(~/.local/bin/mise activate bash)\"" /home/ubuntu/.profile || echo "eval \"\$(~/.local/bin/mise activate bash)\"" >> /home/ubuntu/.profile'
  - sudo -u ubuntu bash -c '~/.local/bin/mise install ruby@4.0'
  - sudo -u ubuntu bash -c '~/.local/bin/mise use --global ruby@4.0'
  - sudo -u ubuntu bash -c '~/.local/bin/mise use --global yarn@latest'
  - sudo -u ubuntu bash -c 'echo "export MYSQL_SOCK=/var/run/mysqld/mysqld.sock" >> /home/ubuntu/.bashrc'
final_message: "all set, rock on!"
